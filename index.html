<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Very Hungry Caterpillar</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      background:#fdf6e3;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      min-height:100vh;
      padding:16px 8px;
      font-family:Georgia,serif;
    }
    #wrap{width:100%;max-width:560px;}
    #topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 4px 4px;flex-wrap:wrap;gap:4px;}
    #title-text{font-size:clamp(13px,3.5vw,20px);color:#c0392b;font-weight:bold;}
    #score-text{font-size:clamp(12px,3vw,15px);color:#555;}
    #reset-btn{background:#c0392b;color:#fff;border:none;border-radius:20px;padding:8px 16px;font-size:14px;cursor:pointer;font-weight:bold;}
    #reset-btn:hover{background:#96281b;}
    #msg{text-align:center;font-size:clamp(12px,3vw,16px);color:#8B4513;padding:4px;min-height:24px;font-style:italic;margin-bottom:6px;}
    #msg.win{color:#c0392b;font-weight:bold;animation:pop 0.4s ease-in-out 4;}
    @keyframes pop{0%,100%{transform:scale(1);}50%{transform:scale(1.15);}}
    #arena{position:relative;width:100%;aspect-ratio:1/1;}
    #arena svg.bg-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
    .food-svg{position:absolute;cursor:pointer;transform-origin:center;transition:transform 0.15s;}
    .food-svg:hover{transform:scale(1.15);}
    .food-svg.eaten{pointer-events:none;}
    .food-svg.crumbling{animation:crumble 0.55s ease-in forwards;}
    @keyframes crumble{0%{opacity:1;transform:scale(1) rotate(0);}40%{transform:scale(1.2) rotate(12deg);}100%{opacity:0;transform:scale(0) rotate(40deg);}}
    .crumb-dot{position:absolute;border-radius:50%;pointer-events:none;animation:fly 0.65s ease-out forwards;}
    @keyframes fly{0%{opacity:1;transform:translate(-50%,-50%) scale(1);}100%{opacity:0;transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(0);}}
    #cat-wrap{position:absolute;pointer-events:none;z-index:20;transition:left 0.9s cubic-bezier(.4,0,.2,1),top 0.9s cubic-bezier(.4,0,.2,1);}
    #cat-wrap.munch{animation:munch 0.28s ease-in-out 4;}
    @keyframes munch{0%,100%{transform:scale(1) rotate(0);}30%{transform:scale(1.18) rotate(-6deg);}70%{transform:scale(0.92) rotate(5deg);}}
  </style>
</head>
<body>

<div id="wrap">
  <div id="topbar">
    <span id="title-text">🐛 The Very Hungry Caterpillar</span>
    <span id="score-text">Eaten: <b id="cnt">0</b>/<b id="tot">0</b></span>
    <button id="reset-btn">↺ Reset</button>
  </div>
  <div id="msg">Tap a food to feed the caterpillar!</div>
  <div id="arena">

    <svg class="bg-svg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="check" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
          <rect width="40" height="40" fill="#f9e4b7"/>

      </defs>
      <rect width="400" height="400" rx="16" fill="url(#check)" filter="url(#rough)"/>
      <rect width="400" height="18" fill="#c0392b" opacity="0.85"/>
      <rect y="382" width="400" height="18" fill="#c0392b" opacity="0.85"/>
      <rect width="18" height="400" fill="#c0392b" opacity="0.85"/>
      <rect x="382" width="18" height="400" fill="#c0392b" opacity="0.85"/>
      <g stroke="#fff" stroke-width="2" opacity="0.5">
        <line x1="30" y1="0" x2="30" y2="18"/><line x1="50" y1="0" x2="50" y2="18"/>
        <line x1="70" y1="0" x2="70" y2="18"/><line x1="90" y1="0" x2="90" y2="18"/>
        <line x1="110" y1="0" x2="110" y2="18"/><line x1="130" y1="0" x2="130" y2="18"/>
        <line x1="150" y1="0" x2="150" y2="18"/><line x1="170" y1="0" x2="170" y2="18"/>
        <line x1="190" y1="0" x2="190" y2="18"/><line x1="210" y1="0" x2="210" y2="18"/>
        <line x1="230" y1="0" x2="230" y2="18"/><line x1="250" y1="0" x2="250" y2="18"/>
        <line x1="270" y1="0" x2="270" y2="18"/><line x1="290" y1="0" x2="290" y2="18"/>
        <line x1="310" y1="0" x2="310" y2="18"/><line x1="330" y1="0" x2="330" y2="18"/>
        <line x1="350" y1="0" x2="350" y2="18"/><line x1="370" y1="0" x2="370" y2="18"/>
        <line x1="30" y1="382" x2="30" y2="400"/><line x1="60" y1="382" x2="60" y2="400"/>
        <line x1="90" y1="382" x2="90" y2="400"/><line x1="120" y1="382" x2="120" y2="400"/>
        <line x1="150" y1="382" x2="150" y2="400"/><line x1="180" y1="382" x2="180" y2="400"/>
        <line x1="210" y1="382" x2="210" y2="400"/><line x1="240" y1="382" x2="240" y2="400"/>
        <line x1="270" y1="382" x2="270" y2="400"/><line x1="300" y1="382" x2="300" y2="400"/>
        <line x1="330" y1="382" x2="330" y2="400"/><line x1="360" y1="382" x2="360" y2="400"/>
      </g>
    </svg>

    <div id="cat-wrap"></div>

  </div>
</div>

<script>
const FOODS = [
  {name:'apple',     draw:drawApple},
  {name:'pear',      draw:drawPear},
  {name:'plum',      draw:drawPlum},
  {name:'orange',    draw:drawOrange},
  {name:'cake',      draw:drawCake},
  {name:'ice cream', draw:drawIceCream},
  {name:'cheese',    draw:drawCheese},
  {name:'pickle',    draw:drawPickle},
  {name:'cupcake',   draw:drawCupcake},
  {name:'lemon',     draw:drawLemon},
  {name:'grapes',    draw:drawGrapes},
  {name:'sausage',   draw:drawSausage},
  {name:'pie',       draw:drawPie},
  {name:'cookie',    draw:drawCookie},
];

// This function places all 14 foods in random spots that don't overlap each other.
// The blanket is treated as a grid of cells — each food gets its own cell
// so they always stay spread out and never pile on top of each other.
function randomisePositions() {
  // Divide the blanket into a 4-column x 4-row grid (16 cells, we pick 14)
  // Each cell is about 25% wide and 25% tall
  // We shuffle all 16 cells and assign one food per cell,
  // then pick a random spot within that cell so it looks natural
  const cells = [];
  for (let row = 0; row < 4; row++) {
    for (let col = 0; col < 4; col++) {
      cells.push({ col, row });
    }
  }
  // Shuffle the cells using Fisher-Yates shuffle
  // (Fisher-Yates is just a standard way to randomly reorder a list)
  for (let i = cells.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cells[i], cells[j]] = [cells[j], cells[i]];
  }
  // Assign the first 14 shuffled cells to our 14 foods
  return FOODS.map((food, i) => {
    const cell = cells[i];
    // Pick a random position within this cell, keeping away from the blanket border
    const minPct = 14; // stay away from edges (the red border)
    const maxPct = 86;
    const cellW = (maxPct - minPct) / 4; // each cell is 1/4 of the safe area
    const cellH = (maxPct - minPct) / 4;
    const x = minPct + cell.col * cellW + Math.random() * cellW * 0.8;
    const y = minPct + cell.row * cellH + Math.random() * cellH * 0.8;
    return { ...food, x: Math.round(x), y: Math.round(y) };
  });
}

const arena    = document.getElementById('arena');
const catWrap  = document.getElementById('cat-wrap');
const cntEl    = document.getElementById('cnt');
const totEl    = document.getElementById('tot');
const msgEl    = document.getElementById('msg');
const resetBtn = document.getElementById('reset-btn');

let eaten = 0, moving = false, catX = 44, catY = 44;
let currentFacingRight = false;
totEl.textContent = FOODS.length;

/* ── Caterpillar builder ── */
function buildCatSVG(facingRight) {
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns,'svg');
  svg.setAttribute('viewBox','0 0 130 44');
  svg.setAttribute('xmlns', ns);
  svg.style.cssText = 'width:clamp(78px,17vw,118px);height:auto;display:block;overflow:visible;';
  if (facingRight) svg.style.transform = 'scaleX(-1)';

  const defs = document.createElementNS(ns,'defs');
  const filt = document.createElementNS(ns,'filter');
  filt.setAttribute('id','ct');
  filt.setAttribute('x','-10%'); filt.setAttribute('y','-10%');
  filt.setAttribute('width','120%'); filt.setAttribute('height','120%');
  const turb = document.createElementNS(ns,'feTurbulence');
  turb.setAttribute('type','fractalNoise');
  turb.setAttribute('baseFrequency','0.7');
  turb.setAttribute('numOctaves','3');
  turb.setAttribute('result','n');
  const disp = document.createElementNS(ns,'feDisplacementMap');
  disp.setAttribute('in','SourceGraphic'); disp.setAttribute('in2','n');
  disp.setAttribute('scale','2.5');
  disp.setAttribute('xChannelSelector','R'); disp.setAttribute('yChannelSelector','G');
  filt.appendChild(turb); filt.appendChild(disp);
  defs.appendChild(filt);
  svg.appendChild(defs);

  function e(tag, attrs) {
    const el = document.createElementNS(ns, tag);
    for (const [k,v] of Object.entries(attrs)) el.setAttribute(k, v);
    return el;
  }
  const f = 'url(#ct)';

  svg.appendChild(e('ellipse',{cx:'118',cy:'24',rx:'10',ry:'9',fill:'#c0392b',filter:f}));
  svg.appendChild(e('ellipse',{cx:'103',cy:'24',rx:'10',ry:'9',fill:'#27ae60',filter:f}));
  svg.appendChild(e('ellipse',{cx:'88', cy:'24',rx:'10',ry:'9',fill:'#f39c12',filter:f}));
  svg.appendChild(e('ellipse',{cx:'73', cy:'24',rx:'10',ry:'9',fill:'#27ae60',filter:f}));
  svg.appendChild(e('ellipse',{cx:'58', cy:'24',rx:'10',ry:'9',fill:'#c0392b',filter:f}));
  svg.appendChild(e('ellipse',{cx:'34',cy:'24',rx:'18',ry:'16',fill:'#c0392b',filter:f}));
  svg.appendChild(e('line',{x1:'26',y1:'10',x2:'18',y2:'2',stroke:'#333','stroke-width':'1.8','stroke-linecap':'round'}));
  svg.appendChild(e('line',{x1:'36',y1:'9', x2:'40',y2:'1',stroke:'#333','stroke-width':'1.8','stroke-linecap':'round'}));
  svg.appendChild(e('circle',{cx:'17',cy:'2',r:'3',fill:'#e74c3c'}));
  svg.appendChild(e('circle',{cx:'41',cy:'1',r:'3',fill:'#e74c3c'}));
  svg.appendChild(e('circle',{cx:'24',cy:'19',r:'5',fill:'#fff'}));
  svg.appendChild(e('circle',{cx:'24',cy:'19',r:'3',fill:'#1a1a1a'}));
  svg.appendChild(e('circle',{cx:'25.5',cy:'17.5',r:'1.2',fill:'#fff'}));
  svg.appendChild(e('circle',{cx:'40',cy:'19',r:'5',fill:'#fff'}));
  svg.appendChild(e('circle',{cx:'40',cy:'19',r:'3',fill:'#1a1a1a'}));
  svg.appendChild(e('circle',{cx:'41.5',cy:'17.5',r:'1.2',fill:'#fff'}));
  svg.appendChild(e('path',{d:'M24 30 Q34 36 44 30',stroke:'#fff','stroke-width':'1.8',fill:'none','stroke-linecap':'round'}));
  [[48,33],[58,33],[68,33],[78,33],[88,33],[98,33]].forEach(([x,y])=>{
    svg.appendChild(e('line',{x1:x,y1:y,x2:x-2,y2:42,stroke:'#333','stroke-width':'1.3','stroke-linecap':'round'}));
  });

  return svg;
}

function setCatFacing(facingRight) {
  if (facingRight === currentFacingRight && catWrap.querySelector('svg')) return;
  currentFacingRight = facingRight;
  catWrap.innerHTML = '';
  catWrap.appendChild(buildCatSVG(facingRight));
}

function placeCat(xPct, yPct, targetXPct) {
  const facingRight = (targetXPct !== undefined) ? (targetXPct > xPct - 5) : currentFacingRight;
  setCatFacing(facingRight);
  const aw = arena.clientWidth, ah = arena.clientHeight;
  const cw = catWrap.clientWidth  || 95;
  const ch = catWrap.clientHeight || 40;
  let px, py;
  if (facingRight) {
    px = Math.min(Math.max((xPct/100)*aw - cw + 10, 4), aw - cw - 4);
  } else {
    px = Math.min(Math.max((xPct/100)*aw - 10, 4), aw - cw - 4);
  }
  py = Math.min(Math.max((yPct/100)*ah - ch/2, 4), ah - ch - 4);
  catWrap.style.left = px + 'px';
  catWrap.style.top  = py + 'px';
}

/* ── SVG food helpers ── */
const NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(NS, tag);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function tex() { return 'url(#food-tex)'; }

function makeFoodSvgWrapper(drawFn, name) {
  const div = document.createElement('div');
  div.className = 'food-svg';
  div.dataset.name = name;
  const svg = document.createElementNS(NS,'svg');
  svg.setAttribute('xmlns', NS);
  svg.style.cssText = 'overflow:visible;display:block;';
  const defs = document.createElementNS(NS,'defs');
  const filt = document.createElementNS(NS,'filter');
  filt.setAttribute('id','food-tex');
  filt.setAttribute('x','-10%'); filt.setAttribute('y','-10%');
  filt.setAttribute('width','120%'); filt.setAttribute('height','120%');
  const turb = document.createElementNS(NS,'feTurbulence');
  turb.setAttribute('type','fractalNoise');
  turb.setAttribute('baseFrequency','0.65');
  turb.setAttribute('numOctaves','3');
  turb.setAttribute('result','n');
  const disp = document.createElementNS(NS,'feDisplacementMap');
  disp.setAttribute('in','SourceGraphic'); disp.setAttribute('in2','n');
  disp.setAttribute('scale','3');
  disp.setAttribute('xChannelSelector','R'); disp.setAttribute('yChannelSelector','G');
  filt.appendChild(turb); filt.appendChild(disp);
  defs.appendChild(filt);
  svg.appendChild(defs);
  drawFn(svg);
  div.appendChild(svg);
  return div;
}

/* ── Food drawing functions ── */

}

  svg.appendChild(el('rect',{x:'10',y:'14',width:'46',height:'6',rx:'2',fill:'#fff',filter:tex()}));
  svg.appendChild(el('rect',{x:'29',y:'6',width:'6',height:'10',rx:'2',fill:'#FDD835'}));

  svg.appendChild(el('circle',{cx:'52',cy:'38',r:'3',fill:'#f39c12'}));

}
function drawPickle(svg) {
  svg.setAttribute('viewBox','-5 -5 40 75'); svg.style.width='clamp(26px,5.5vw,38px)'; svg.style.height='auto';
  svg.appendChild(el('ellipse',{cx:'15',cy:'34',rx:'13',ry:'31',fill:'#388E3C',filter:tex()}));
  svg.appendChild(el('ellipse',{cx:'10',cy:'22',rx:'4',ry:'3',fill:'#2E7D32',opacity:'0.7'}));

  svg.setAttribute('viewBox','-5 -5 65 72'); svg.style.width='clamp(40px,8.5vw,58px)'; svg.style.height='auto';
  svg.appendChild(el('path',{d:'M10,40 L16,64 L48,64 L54,40 Z',fill:'#E91E63',filter:tex()}));

function drawLemon(svg) {
  svg.setAttribute('viewBox','-5 -5 62 52'); svg.style.width='clamp(38px,8vw,55px)'; svg.style.height='auto';
  svg.appendChild(el('ellipse',{cx:'28',cy:'22',rx:'26',ry:'20',fill:'#FDD835',filter:tex()}));
  svg.appendChild(el('ellipse',{cx:'5', cy:'22',rx:'5',ry:'4',fill:'#F9A825',filter:tex()}));
  svg.appendChild(el('ellipse',{cx:'51',cy:'22',rx:'5',ry:'4',fill:'#F9A825',filter:tex()}));

/* ── Sound ── */
function playMunch() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 95, 190].forEach(d => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(240, ctx.currentTime + d/1000);
      o.frequency.exponentialRampToValueAtTime(70, ctx.currentTime + d/1000 + 0.1);
      g.gain.setValueAtTime(0.22, ctx.currentTime + d/1000);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + d/1000 + 0.12);
      o.start(ctx.currentTime + d/1000);
      o.stop(ctx.currentTime + d/1000 + 0.14);
    });
  } catch(e) {}
}

/* ── Crumbs ── */
function spawnCrumbs(div) {
  const r = div.getBoundingClientRect(), ar = arena.getBoundingClientRect();
  const cx = r.left - ar.left + r.width/2, cy = r.top - ar.top + r.height/2;
  const cols = ['#D4A45A','#BF360C','#7B1FA2','#27ae60','#c0392b','#FDD835'];
  for (let i = 0; i < 14; i++) {
    const d = document.createElement('div');
    d.className = 'crumb-dot';
    const angle = (i/14) * Math.PI * 2, dist = 18 + Math.random() * 32;
    d.style.cssText = `position:absolute;width:${5+Math.random()*5}px;height:${4+Math.random()*4}px;border-radius:50%;left:${cx}px;top:${cy}px;background:${cols[Math.floor(Math.random()*cols.length)]};--dx:${Math.cos(angle)*dist}px;--dy:${Math.sin(angle)*dist}px;z-index:15;pointer-events:none;`;
    arena.appendChild(d);
    setTimeout(() => d.remove(), 750);
  }
}

/* ── Eat a food item ── */
function eatFood(div) {
  if (moving || div.classList.contains('eaten')) return;
  moving = true;
  div.classList.add('eaten');
  const tx = parseFloat(div.dataset.x), ty = parseFloat(div.dataset.y);
  placeCat(tx, ty, tx);
  catX = tx; catY = ty;
  msgEl.className = '';
  msgEl.textContent = 'Crawling to the ' + div.dataset.name + '…';
  setTimeout(() => {
    playMunch();
    catWrap.classList.remove('munch');
    void catWrap.offsetWidth;
    catWrap.classList.add('munch');
    spawnCrumbs(div);
    div.classList.add('crumbling');
    msgEl.textContent = 'Munch munch munch! 😋';
    setTimeout(() => {
      div.style.display = 'none';
      catWrap.classList.remove('munch');
      eaten++;
      cntEl.textContent = eaten;
      if (eaten === FOODS.length) {
        msgEl.className = 'win';
        msgEl.textContent = '🎉 The caterpillar ate everything and became a beautiful butterfly!';
      } else {
        msgEl.textContent = 'Tap another food!';
      }
      moving = false;
    }, 700);
  }, 920);
}

/* ── Set up the board ── */
function init() {
  arena.querySelectorAll('.food-svg, .crumb-dot').forEach(e => e.remove());
  eaten = 0; moving = false;
  cntEl.textContent = 0;
  msgEl.className = '';
  msgEl.textContent = 'Tap a food to feed the caterpillar!';
  catWrap.classList.remove('munch');
  catX = 44; catY = 44;
  setCatFacing(false);
  setTimeout(() => placeCat(catX, catY, catX), 50);

  // Get a fresh random layout every time
  const placedFoods = randomisePositions();

  placedFoods.forEach((f, i) => {
    const div = makeFoodSvgWrapper(f.draw, f.name);
    div.style.cssText += `left:${f.x}%;top:${f.y}%;transform-origin:center;`;
    div.dataset.x = f.x;
    div.dataset.y = f.y;
    div.dataset.name = f.name;
    div.id = 'fd' + i;
    div.addEventListener('click', () => eatFood(div));
    arena.appendChild(div);
  });
}

resetBtn.addEventListener('click', init);
window.addEventListener('resize', () => placeCat(catX, catY, catX));
init();
</script>
